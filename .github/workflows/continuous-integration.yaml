name: Continuous Integration

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Format
        run: bun run fmt:check

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Lint
        run: bun run lint:ci

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Typecheck
        run: bun run typecheck

  fallow:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # audit needs a merge base as the default depth-1 checkout has no local main ref
          fetch-depth: 0
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Fallow audit
        run: bun run fallow:audit -- --base ${{ github.event.pull_request.base.sha || 'origin/main' }}

  rust-fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/install-rust
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Rust format
        run: bun run fmt:rust:check

  rust-clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/install-rust
        with:
          cache: "true"
          tauri-deps: "true"
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Clippy
        run: bun run clippy
