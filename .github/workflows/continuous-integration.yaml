name: Continuous Integration

on:
  push:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Format
        run: bun run fmt:check

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Lint
        run: bun run lint:ci

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Typecheck
        run: bun run typecheck

  fallow:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # audit needs a merge base as the default depth-1 checkout has no local main ref
          fetch-depth: 0
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Fallow audit
        run: bun run fallow:audit -- --base ${{ github.event.pull_request.base.sha || 'origin/main' }}
