name: Builds

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: builds-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  desktop-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/install-rust
        with:
          cache: "true"
      - uses: ./.github/actions/install-bun-and-dependencies
      - name: Tauri build
        run: bun run tauri build -- --bundles app
      - name: Upload macOS desktop bundles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gdex-desktop-macos-${{ github.sha }}
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14
