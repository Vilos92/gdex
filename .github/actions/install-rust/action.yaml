name: Install Rust
description: Toolchain from rust-toolchain.toml, optional Linux Tauri deps and cargo cache
inputs:
  cache:
    description: Restore/save ~/.cargo and src-tauri/target via rust-cache (keyed on Cargo.lock)
    required: false
    default: "false"
  tauri-deps:
    description: apt packages required to compile Tauri on ubuntu-latest (Clippy only)
    required: false
    default: "false"
runs:
  using: composite
  steps:
    # Composite actions pass an empty toolchain input unless set explicitly (won't read rust-toolchain.toml).
    # Keep channel/components in sync with rust-toolchain.toml at repo root.
    - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: 1.95.0
        components: rustfmt, clippy

    - name: Install Tauri Linux dependencies
      if: inputs.tauri-deps == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      if: inputs.cache == 'true'
      with:
        workspaces: src-tauri
