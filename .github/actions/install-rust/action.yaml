name: Install Rust
description: Toolchain from rust-toolchain.toml, optional Linux Tauri deps and cargo cache
inputs:
  cache:
    description: Restore/save ~/.cargo and src-tauri/target via rust-cache (keyed on Cargo.lock)
    required: false
    default: "false"
  tauri-deps:
    description: apt packages required to compile Tauri on ubuntu-latest (Clippy only)
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - name: Install Tauri Linux dependencies
      if: inputs.tauri-deps == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - uses: Swatinem/rust-cache@v2
      if: inputs.cache == 'true'
      with:
        workspaces: src-tauri
